name: Problem with a particular file or file type
description: Report a problem that happens only with a particular file or file type.
body:
  - type: markdown
    attributes:
      value: |
        Use this form when the problem is tied to a specific file, camera, encoder, or file type. If the same problem happens across many different files, use the general bug report form instead.
  - type: checkboxes
    id: initial-checklist
    attributes:
      label: Please try these quick checks first
      options:
        - label: I confirmed that the problem is specific to this file or file type.
          required: true
        - label: I tried the current version from this repository.
          required: true
        - label: I checked the README and installation notes before opening this report.
          required: true
        - label: I searched existing issues and discussions in this repository.
          required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Describe exactly what you do in ClipPress before the problem appears. Screenshots or screencasts are welcome.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What happens instead?
    validations:
      required: true
  - type: textarea
    id: error-report
    attributes:
      label: Provide an error report
      description: Paste the report from `Help -> Report an error` if one is available.
    validations:
      required: true
  - type: input
    id: share-file
    attributes:
      label: Share the file if possible
      description: If the issue depends on a specific file, share the smallest sample that still reproduces the problem.
    validations:
      required: false
  - type: textarea
    id: share-log
    attributes:
      label: Share log from developer tools
      description: Open developer tools before reproducing the problem, then paste any relevant console output here.
    validations:
      required: false
