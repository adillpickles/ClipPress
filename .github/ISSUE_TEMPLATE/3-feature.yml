name: Feature request
description: Suggest an improvement for ClipPress.
body:
  - type: checkboxes
    id: initial-checklist
    attributes:
      label: Please check these first
      options:
        - label: I checked the menus and keyboard shortcuts in case the feature already exists.
          required: true
        - label: I tried the current version from this repository.
          required: true
        - label: I checked the README and installation notes to make sure this is not already covered.
          required: true
        - label: I searched existing issues and discussions in this repository.
          required: true
  - type: textarea
    id: feature-description
    attributes:
      label: Description
      description: Describe clearly what you want to add or improve in ClipPress. Screenshots or screencasts are welcome.
    validations:
      required: true
