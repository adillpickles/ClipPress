name: Bug report
description: Describe a bug in ClipPress that is not limited to one file or file type.
body:
  - type: checkboxes
    id: initial-checklist
    attributes:
      label: Please try these checks first
      options:
        - label: I tried the current version from this repository.
          required: true
        - label: I read the README and installation notes.
          required: true
        - label: I searched existing issues and discussions in this repository.
          required: true
        - label: This problem happens with multiple kinds of files, not just one source file or format.
          required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      description: Which operating system are you running?
      options:
        - MacOS 15
        - MacOS 14
        - MacOS 13
        - MacOS 12
        - MacOS 11
        - MacOS 10
        - Windows 11
        - Windows 10
        - Windows 8.1
        - Windows 8
        - Windows 7
        - Windows Vista
        - Linux
        - Other (please specify)
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Describe step by step what you do in ClipPress before the bug appears. Screenshots or screencasts are welcome.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What happens instead?
    validations:
      required: true
  - type: textarea
    id: share-log
    attributes:
      label: Share log from developer tools
      description: If possible, open developer tools before reproducing the bug and paste the relevant console output here.
    validations:
      required: false
